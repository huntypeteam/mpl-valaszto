<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>MPL Átvevőhely választó</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA8iAzG4vyFffL1KV91jfLA75qHWWKqv44&language=hu&region=HU"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}
.page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
}
.card {
    background:#fff;
    padding:16px;
    border-radius:10px;
    margin-bottom:16px;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.type-selector {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}
.type-btn {
    border:2px solid #ddd;
    border-radius:10px;
    padding:12px;
    background:#fff;
    cursor:pointer;
    text-align:center;
}
#mpl-list div {
    padding:10px 0;
    border-bottom:1px solid #ddd;
}
</style>

</head>
<body>

<div class="page">
    <div class="card">
        <h1>MPL átvevőhely választó</h1>
        <p>Válassza ki az átvevőhely típusát, majd kattintson a térképen vagy a listában.</p>
    </div>

    <div class="card">
        <div class="type-selector">
            <button class="type-btn" onclick="setMPLType('CS')"><strong>MPL Csomagautomata</strong></button>
            <button class="type-btn" onclick="setMPLType('PM')"><strong>MPL PostaPont</strong></button>
            <button class="type-btn" onclick="setMPLType('POSTA')"><strong>Postahivatalok</strong></button>
        </div>
    </div>

    <div class="card">
        <div id="mpl-map" style="width:100%; height:650px;"></div>
    </div>

    <div class="card">
        <div id="mpl-list"></div>
    </div>
</div>

<script>
let mplMap;
let mplMarkers = [];
let mplData = [];
let currentType = 'PM'; // alapértelmezett

// XML betöltése GitHub-ról
async function loadMPLXML() {
    try {
        const response = await fetch("https://huntypeteam.github.io/mpl-valaszto/mpl-valaszto.xml");
        const xmlText = await response.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");

        const locations = xml.getElementsByTagName("post");
        mplData = [];

        for (let loc of locations) {

            // GPS koordináták (vessző → pont)
            const gps = loc.getElementsByTagName("gpsData")[0];
            let lat = getXML(gps, "WGSLat").replace(",", ".");
            let lon = getXML(gps, "WGSLon").replace(",", ".");

            // Típus meghatározása
            let type = getXML(loc, "ServicePointType");

            // Postahivatal felismerése
            if (!type || type === "" || loc.getAttribute("isPostPoint") === "0") {
                type = "POSTA";
            }

            const point = {
                name: getXML(loc, "name"),
                zip: loc.getAttribute("zipCode") || "",
                city: getXML(loc, "city"),
                address: buildAddress(loc),
                lat: parseFloat(lat),
                lng: parseFloat(lon),
                type: type   // CS, PM, POSTA
            };

            if (!isNaN(point.lat) && !isNaN(point.lng)) {
                mplData.push(point);
            }
        }

        initMPLMap();
    } catch (e) {
        console.error("XML betöltési hiba:", e);
        alert("Nem sikerült betölteni az MPL átvevőhelyek listáját.");
    }
}

function buildAddress(loc) {
    const street = loc.getElementsByTagName("street")[0];
    if (!street) return "";

    const name = getXML(street, "name");
    const type = getXML(street, "type");
    const house = getXML(street, "houseNumber");

    return `${name} ${type} ${house}`;
}

function getXML(node, tag) {
    const el = node.getElementsByTagName(tag)[0];
    return el ? el.textContent.trim() : "";
}

function initMPLMap() {
    mplMap = new google.maps.Map(document.getElementById("mpl-map"), {
        center: { lat: 47.4979, lng: 19.0402 },
        zoom: 8,
        mapTypeControl: false
    });

    renderMPLPoints();
}

function setMPLType(type) {
    currentType = type;
    renderMPLPoints();
}

function getCurrentPoints() {
    return mplData.filter(p => p.type === currentType);
}

function renderMPLPoints() {
    mplMarkers.forEach(m => m.setMap(null));
    mplMarkers = [];

    const points = getCurrentPoints();
    const listContainer = document.getElementById("mpl-list");
    listContainer.innerHTML = "<h2>Átvevőhelyek listája</h2>";

    const bounds = new google.maps.LatLngBounds();

    points.forEach(point => {
        const pos = { lat: point.lat, lng: point.lng };
        const marker = new google.maps.Marker({
            position: pos,
            map: mplMap,
            title: point.name
        });
        mplMarkers.push(marker);
        bounds.extend(pos);

        const info = new google.maps.InfoWindow({
            content: `
                <strong>${point.name}</strong><br>
                ${point.zip} ${point.city}, ${point.address}<br>
                <button onclick="copyAddress('${point.name} – ${point.zip} ${point.city}, ${point.address}')">
                    Cím másolása
                </button>
            `
        });

        marker.addListener("click", () => {
            info.open(mplMap, marker);
        });

        const item = document.createElement("div");
        item.innerHTML = `
            <strong>${point.name}</strong><br>
            ${point.zip} ${point.city}, ${point.address}<br>
            <button onclick="copyAddress('${point.name} – ${point.zip} ${point.city}, ${point.address}')">
                Cím másolása
            </button>
        `;
        listContainer.appendChild(item);
    });

    if (!bounds.isEmpty()) {
        mplMap.fitBounds(bounds);
    }
}

function copyAddress(text) {
    navigator.clipboard.writeText(text);
    alert("A cím kimásolásra került.");
}

window.addEventListener("load", loadMPLXML);
</script>

</body>
</html>
