<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>MPL Átvevőhely választó</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA8iAzG4vyFffL1KV91jfLA75qHWWKqv44&language=hu&region=HU"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}
.page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
}
.card {
    background:#fff;
    padding:16px;
    border-radius:10px;
    margin-bottom:16px;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.type-selector {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}
.type-btn {
    border:2px solid #ddd;
    border-radius:10px;
    padding:12px;
    background:#fff;
    cursor:pointer;
    text-align:center;
}
#mpl-list div {
    padding:10px 0;
    border-bottom:1px solid #ddd;
}
</style>

</head>
<body>

<div class="page">
    <div class="card">
        <h1>MPL átvevőhely választó</h1>
        <p>Válassza ki az átvevőhely típusát, vagy keressen város, irányítószám vagy név alapján.</p>
    </div>

    <!-- GOMBOK -->
    <div class="card">
        <div class="type-selector">
            <button class="type-btn" onclick="loadXML('CS')"><strong>MPL Csomagautomata</strong></button>
            <button class="type-btn" onclick="loadXML('PP')"><strong>MPL PostaPont</strong></button>
            <button class="type-btn" onclick="loadXML('POSTA')"><strong>Postahivatalok és Postapartnerek</strong></button>
        </div>
    </div>

    <!-- KERESŐMEZŐ -->
    <div class="card">
        <input 
            type="text" 
            id="searchBox" 
            placeholder="Keresés város, irányítószám vagy név alapján..." 
            oninput="filterList()" 
            style="width:100%; padding:12px; font-size:16px; border:2px solid #ddd; border-radius:10px;">
    </div>

    <div class="card">
        <div id="mpl-map" style="width:100%; height:650px;"></div>
    </div>

    <div class="card">
        <div id="mpl-list"></div>
    </div>
</div>

<script>
let mplMap;
let mplMarkers = [];
let mplData = [];

// XML URL-ek
const XML_URLS = {
    "CS": "https://huntypeteam.github.io/mpl-valaszto/mpl_csomagautomata.xml",
    "PP": "https://huntypeteam.github.io/mpl-valaszto/mpl_postapont.xml",
    "POSTA": "https://huntypeteam.github.io/mpl-valaszto/mpl_postak.xml"
};

// XML betöltése
async function loadXML(type) {
    try {
        const response = await fetch(XML_URLS[type]);
        const xmlText = await response.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");

        const locations = xml.getElementsByTagName("post");
        mplData = [];

        for (let loc of locations) {

            const gps = loc.getElementsByTagName("gpsData")[0];
            let lat = getXML(gps, "WGSLat").replace(",", ".");
            let lon = getXML(gps, "WGSLon").replace(",", ".");

            const point = {
                name: getXML(loc, "name"),
                zip: loc.getAttribute("zipCode") || "",
                city: getXML(loc, "city"),
                address: buildAddress(loc),
                lat: parseFloat(lat),
                lng: parseFloat(lon)
            };

            if (!isNaN(point.lat) && !isNaN(point.lng)) {
                mplData.push(point);
            }
        }

        initMPLMap();
    } catch (e) {
        console.error("XML betöltési hiba:", e);
        alert("Nem sikerült betölteni az MPL átvevőhelyek listáját.");
    }
}

function buildAddress(loc) {
    const street = loc.getElementsByTagName("street")[0];
    if (!street) return "";

    const name = getXML(street, "name");
    const type = getXML(street, "type");
    const house = getXML(street, "houseNumber");

    return `${name} ${type} ${house}`;
}

function getXML(node, tag) {
    const el = node.getElementsByTagName(tag)[0];
    return el ? el.textContent.trim() : "";
}

function initMPLMap() {
    // Budapest belváros alapértelmezett középpont
    const budapestCenter = { lat: 47.4979, lng: 19.0402 };

    mplMap = new google.maps.Map(document.getElementById("mpl-map"), {
        center: budapestCenter,
        zoom: 13,            // belvárosi zoom
        mapTypeControl: false
    });

    renderMPLPoints();
}


function renderMPLPoints() {
    mplMarkers.forEach(m => m.setMap(null));
    mplMarkers = [];

    const listContainer = document.getElementById("mpl-list");
    listContainer.innerHTML = "<h2>Átvevőhelyek listája</h2>";

    mplData.forEach(point => {
        const pos = { lat: point.lat, lng: point.lng };
        const marker = new google.maps.Marker({
            position: pos,
            map: mplMap,
            title: point.name
        });
        mplMarkers.push(marker);

        const info = new google.maps.InfoWindow({
            content: `
                <strong>${point.name}</strong><br>
                ${point.zip} ${point.city}, ${point.address}<br>
                <button onclick="copyAddress('${point.name} – ${point.zip} ${point.city}, ${point.address}')">
                    Cím másolása
                </button>
            `
        });

        marker.addListener("click", () => {
            info.open(mplMap, marker);
        });

        const item = document.createElement("div");
        item.innerHTML = `
            <strong>${point.name}</strong><br>
            ${point.zip} ${point.city}, ${point.address}<br>
            <button onclick="copyAddress('${point.name} – ${point.zip} ${point.city}, ${point.address}')">
                Cím másolása
            </button>
        `;
        listContainer.appendChild(item);
    });

    // FONTOS: NINCS fitBounds() → így marad Budapest belváros
}


    if (!bounds.isEmpty()) {
        mplMap.fitBounds(bounds);
    }
}

function copyAddress(text) {
    navigator.clipboard.writeText(text);
    alert("A cím kimásolásra került.");
}

function filterList() {
    const q = document.getElementById("searchBox").value.toLowerCase();

    const filtered = mplData.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.city.toLowerCase().includes(q) ||
        p.zip.toLowerCase().includes(q)
    );

    renderFilteredPoints(filtered);
}

function renderFilteredPoints(points) {
    mplMarkers.forEach(m => m.setMap(null));
    mplMarkers = [];

    const listContainer = document.getElementById("mpl-list");
    listContainer.innerHTML = "<h2>Találatok</h2>";

    const bounds = new google.maps.LatLngBounds();

    points.forEach(point => {
        const pos = { lat: point.lat, lng: point.lng };
        const marker = new google.maps.Marker({
            position: pos,
            map: mplMap,
            title: point.name
        });
        mplMarkers.push(marker);
        bounds.extend(pos);

        const info = new google.maps.InfoWindow({
            content: `
                <strong>${point.name}</strong><br>
                ${point.zip} ${point.city}, ${point.address}<br>
                <button onclick="copyAddress('${point.name} – ${point.zip} ${point.city}, ${point.address}')">
                    Cím másolása
                </button>
            `
        });

        marker.addListener("click", () => {
            info.open(mplMap, marker);
        });

        const item = document.createElement("div");
        item.innerHTML = `
            <strong>${point.name}</strong><br>
            ${point.zip} ${point.city}, ${point.address}<br>
            <button onclick="copyAddress('${point.name} – ${point.zip} ${point.city}, ${point.address}')">
                Cím másolása
            </button>
        `;
        listContainer.appendChild(item);
    });

    if (!bounds.isEmpty()) {
        mplMap.fitBounds(bounds);
    }
}

// Alapértelmezett: Csomagautomata
window.addEventListener("load", () => loadXML("CS"));
</script>

</body>
</html>
